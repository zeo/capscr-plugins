enabled = true

[plugin]
id = "grayscale"
name = "Grayscale"
version = "0.1.0"
author = "zeo"
description = "Convert every capture to grayscale before it's saved, copied, or uploaded."

[runtime]
type = "wasm"
file = "plugin.wasm"

[hooks]
on_capture = "capscr_on_capture"

[capabilities]
image = ["read", "modify"]
